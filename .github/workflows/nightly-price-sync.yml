name: Nightly Price Sync

on:
  schedule:
    # 19:00 UTC = 02:00 AM Bangkok (UTC+7)
    - cron: "0 19 * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  sync:
    name: Sync prices from Google Sheets → Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write  # needed to push the regenerated live_products_export.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install gspread google-auth

      - name: Run price sync (Sheets → Supabase)
        id: sync
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python scripts/nightly_price_sync.py 2>&1 | tee /tmp/sync_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Regenerate live products export from Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python scripts/refresh_live_export_supabase.py 2>&1 | tee /tmp/export_output.txt

      - name: Commit updated live export to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # The file is git-ignored locally but we commit it from CI
          git add -f data/live_products_export.json
          if git diff --staged --quiet; then
            echo "No changes to live export — skipping commit"
          else
            git commit -m "chore(data): nightly price sync $(date -u '+%Y-%m-%d')"
            git push
          fi

      - name: Trigger Vercel deploy
        id: vercel
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}")
          echo "vercel_status=$STATUS" >> $GITHUB_OUTPUT
          if [ "$STATUS" = "201" ]; then
            echo "✓ Vercel deploy triggered (HTTP 201)"
          else
            echo "⚠ Vercel deploy hook returned HTTP $STATUS"
          fi

      - name: Send Gmail summary
        if: always()
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          VERCEL_STATUS: ${{ steps.vercel.outputs.vercel_status }}
          RUN_ID: ${{ github.run_id }}
        run: python scripts/send_sync_email.py
